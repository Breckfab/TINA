<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TINA · Tutora de Inglés A1</title>
<style>
  :root{
    --font-display: 'Segoe UI', 'Trebuchet MS', 'Avenir Next', system-ui, sans-serif;
    --font-body: 'Segoe UI', 'Helvetica Neue', Arial, system-ui, sans-serif;
    --font-mono: 'Consolas', 'SF Mono', 'Courier New', monospace;
    --paper:#EEF2F6;
    --paper-line:#D7E1EC;
    --ink:#1F3557;
    --ink-soft:#4C5F7C;
    --margin-red:#C1443C;
    --chalk-teal:#2F7A6B;
    --pencil-yellow:#F0A93B;
    --white:#FFFFFF;
    --shadow: 0 2px 10px rgba(31,53,87,0.08);
  }
  *{box-sizing:border-box;}
  html,body{
    height:100%;
    margin:0;
    background:var(--paper);
    font-family:var(--font-body);
    color:var(--ink);
  }
  .app{
    display:flex;
    height:100vh;
    max-width:920px;
    margin:0 auto;
    background:var(--white);
    box-shadow:0 0 40px rgba(31,53,87,0.10);
    position:relative;
    overflow:hidden;
  }
  /* spiral spine */
  .spine{
    width:26px;
    flex-shrink:0;
    background:linear-gradient(180deg, #F4F7FA, #E4EBF2);
    border-right:1px solid var(--paper-line);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px 0;
    gap:16px;
    overflow:hidden;
  }
  .spine .hole{
    width:10px;height:10px;border-radius:50%;
    background:var(--paper);
    box-shadow:inset 0 1px 3px rgba(31,53,87,0.25);
  }
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 22px;
    border-bottom:2px solid var(--paper-line);
    background:var(--white);
    position:relative;
  }
  header::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:-2px;
    height:2px;
    background:linear-gradient(90deg, var(--margin-red), var(--chalk-teal), var(--pencil-yellow));
  }
  .avatar{
    width:48px;height:48px;flex-shrink:0;
  }
  .brand h1{
    font-family:var(--font-display);
    font-size:22px;
    margin:0;
    color:var(--ink);
    letter-spacing:0.5px;
  }
  .brand p{
    margin:2px 0 0;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .level-tag{
    margin-left:auto;
    font-family:var(--font-mono);
    font-size:11px;
    background:var(--paper);
    border:1px solid var(--paper-line);
    color:var(--ink-soft);
    padding:5px 10px;
    border-radius:20px;
    white-space:nowrap;
  }

  /* unit tabs */
  .units{
    display:flex;
    gap:8px;
    padding:12px 18px;
    overflow-x:auto;
    background:var(--paper);
    border-bottom:1px solid var(--paper-line);
    scrollbar-width:thin;
  }
  .units::-webkit-scrollbar{height:6px;}
  .units::-webkit-scrollbar-thumb{background:var(--paper-line);border-radius:4px;}
  .unit-tab{
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:56px;height:56px;
    background:var(--white);
    border:1px solid var(--paper-line);
    border-radius:10px;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    font-family:var(--font-display);
  }
  .unit-tab:hover{
    transform:translateY(-2px);
    box-shadow:var(--shadow);
    border-color:var(--chalk-teal);
  }
  .unit-tab .n{
    font-size:15px;
    font-weight:600;
    color:var(--ink);
  }
  .unit-tab .lbl{
    font-family:var(--font-body);
    font-size:8.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }

  /* chat area */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:22px;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 31px,
      var(--paper-line) 31px, var(--paper-line) 32px
    );
    background-attachment:local;
  }
  .msg-row{
    display:flex;
    margin-bottom:16px;
    gap:10px;
  }
  .msg-row.user{ justify-content:flex-end; }
  .bubble{
    max-width:72%;
    padding:12px 15px;
    font-size:14.5px;
    line-height:1.55;
    border-radius:12px;
    box-shadow:var(--shadow);
    white-space:pre-wrap;
  }
  .msg-row.tina .bubble{
    background:var(--white);
    border-left:3px solid var(--margin-red);
    color:var(--ink);
    border-top-left-radius:4px;
  }
  .msg-row.user .bubble{
    background:var(--ink);
    color:var(--white);
    border-top-right-radius:4px;
  }
  .mini-avatar{
    width:30px;height:30px;flex-shrink:0;margin-top:2px;
  }
  .typing{
    display:flex;
    gap:4px;
    padding:6px 2px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--ink-soft);
    opacity:.5;
    animation:bounce 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{
    0%,60%,100%{transform:translateY(0); opacity:.4;}
    30%{transform:translateY(-4px); opacity:1;}
  }

  form.composer{
    display:flex;
    gap:10px;
    padding:14px 18px;
    border-top:1px solid var(--paper-line);
    background:var(--white);
  }
  .composer input{
    flex:1;
    border:1px solid var(--paper-line);
    background:var(--paper);
    border-radius:10px;
    padding:11px 14px;
    font-size:14.5px;
    font-family:var(--font-body);
    color:var(--ink);
    outline:none;
    transition:border-color .12s ease;
  }
  .composer input:focus{
    border-color:var(--chalk-teal);
  }
  .composer button{
    background:var(--ink);
    color:var(--white);
    border:none;
    border-radius:10px;
    width:44px;height:44px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background .12s ease;
    flex-shrink:0;
  }
  .composer button:hover{ background:var(--chalk-teal); }
  .composer button:disabled{ background:var(--paper-line); cursor:not-allowed; }

  @media (max-width:560px){
    .bubble{ max-width:85%; }
    .brand h1{ font-size:19px; }
    .level-tag{ display:none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="spine" id="spine"></div>
  <div class="main">
    <header>
      <svg class="avatar" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" fill="#F0A93B"/>
        <circle cx="24" cy="21" r="9" fill="#FFFFFF"/>
        <path d="M15 32c2.5-5 5.7-7.5 9-7.5s6.5 2.5 9 7.5c-2.8 3-6 4.5-9 4.5s-6.2-1.5-9-4.5z" fill="#FFFFFF"/>
        <circle cx="20.5" cy="20" r="1.4" fill="#1F3557"/>
        <circle cx="27.5" cy="20" r="1.4" fill="#1F3557"/>
        <path d="M20.5 24c1 1 6 1 7 0" stroke="#1F3557" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M13 17c3-6 8.5-6.5 11-6.5s8 0.5 11 6.5c-3-1.5-6-1-11-1s-8-0.5-11 1z" fill="#1F3557"/>
        <rect x="10" y="16.5" width="6" height="2.4" rx="1.2" fill="#C1443C"/>
      </svg>
      <div class="brand">
        <h1>TINA</h1>
        <p>Tu tutora de inglés · English File Beginner 5th Ed.</p>
      </div>
      <div class="level-tag">NIVEL A1</div>
    </header>

    <div class="units" id="units"></div>

    <div class="chat" id="chat"></div>

    <form class="composer" id="composer">
      <input id="input" type="text" placeholder="Escribí tu pregunta, ej: ¿cómo se usa el verbo be?" autocomplete="off" />
      <button type="submit" id="sendBtn" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 12L21 3L14 21L11 13L3 12Z" stroke="white" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </button>
    </form>
  </div>
</div>

<script>
/* El system prompt de TINA vive en el backend (api/chat.js), no acá,
   para que no quede expuesto ni sea editable desde el navegador. */

const UNITS = [
  {n:"1A", lbl:"Be: I/you", prompt:"Explicame el verbo be en singular (I, you)"},
  {n:"1B", lbl:"Países", prompt:"Explicame el verbo be con he/she/it y países"},
  {n:"PE1", lbl:"Abecedario", prompt:"Ayudame con el abecedario en inglés"},
  {n:"2A", lbl:"Nacionalid.", prompt:"Explicame el verbo be en plural (we, you, they) y nacionalidades"},
  {n:"2B", lbl:"Números", prompt:"Explicame los números del 11 al 100 y las preguntas Wh-"},
  {n:"3A", lbl:"a/an", prompt:"Explicame sustantivos singulares y plurales, y cuándo usar a/an"},
  {n:"3B", lbl:"this/that", prompt:"Explicame this, that, these, those"},
  {n:"4A", lbl:"Familia", prompt:"Explicame los adjetivos posesivos y el posesivo 's"},
  {n:"4B", lbl:"Adjetivos", prompt:"Explicame adjetivos y colores en inglés"},
  {n:"5A", lbl:"Pres. simple", prompt:"Explicame el presente simple afirmativo (I, you, we, they)"},
  {n:"5B", lbl:"Pres. simple?", prompt:"Explicame el presente simple en preguntas (I, you, we, they)"},
  {n:"6A", lbl:"He/she/it", prompt:"Explicame el presente simple con he, she, it"},
  {n:"6B", lbl:"Frecuencia", prompt:"Explicame los adverbios de frecuencia"},
  {n:"PE3", lbl:"La hora", prompt:"Ayudame a decir la hora en inglés"},
  {n:"7A", lbl:"Preguntas", prompt:"Explicame el orden de palabras en preguntas con be y presente simple"},
  {n:"7B", lbl:"Imperativos", prompt:"Explicame los imperativos y los pronombres objeto"},
  {n:"8A", lbl:"Can/can't", prompt:"Explicame can y can't"},
  {n:"8B", lbl:"Like+ing", prompt:"Explicame like/love/hate + verbo con -ing"},
  {n:"9A", lbl:"Continuo", prompt:"Explicame el presente continuo"},
  {n:"9B", lbl:"Cont. vs simple", prompt:"Explicame la diferencia entre presente continuo y presente simple"},
  {n:"10A", lbl:"There's/are", prompt:"Explicame there's a... y there are some..."},
  {n:"10B", lbl:"Was/were", prompt:"Explicame el pasado simple del verbo be (was/were)"},
  {n:"11A", lbl:"Pas. regular", prompt:"Explicame el pasado simple de verbos regulares"},
  {n:"11B", lbl:"Irregulares", prompt:"Explicame el pasado simple de get, go, have, do"},
  {n:"12B", lbl:"Repaso", prompt:"Dame un ejercicio de repaso de pasado simple"}
];

let history = [];
let studentName = null;

const chatEl = document.getElementById('chat');
const unitsEl = document.getElementById('units');
const spineEl = document.getElementById('spine');
const form = document.getElementById('composer');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

for(let i=0;i<14;i++){
  const h = document.createElement('div');
  h.className = 'hole';
  spineEl.appendChild(h);
}

UNITS.forEach(u=>{
  const tab = document.createElement('div');
  tab.className = 'unit-tab';
  tab.innerHTML = `<div class="n">${u.n}</div><div class="lbl">${u.lbl}</div>`;
  tab.title = u.prompt;
  tab.addEventListener('click', ()=> sendMessage(u.prompt));
  unitsEl.appendChild(tab);
});

function miniAvatarSVG(){
  return `<svg class="mini-avatar" viewBox="0 0 48 48" fill="none">
    <circle cx="24" cy="24" r="22" fill="#F0A93B"/>
    <circle cx="24" cy="21" r="9" fill="#FFFFFF"/>
    <path d="M15 32c2.5-5 5.7-7.5 9-7.5s6.5 2.5 9 7.5c-2.8 3-6 4.5-9 4.5s-6.2-1.5-9-4.5z" fill="#FFFFFF"/>
    <circle cx="20.5" cy="20" r="1.4" fill="#1F3557"/>
    <circle cx="27.5" cy="20" r="1.4" fill="#1F3557"/>
    <path d="M20.5 24c1 1 6 1 7 0" stroke="#1F3557" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M13 17c3-6 8.5-6.5 11-6.5s8 0.5 11 6.5c-3-1.5-6-1-11-1s-8-0.5-11 1z" fill="#1F3557"/>
    <rect x="10" y="16.5" width="6" height="2.4" rx="1.2" fill="#C1443C"/>
  </svg>`;
}

function addBubble(role, text){
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'tina');
  let inner = '';
  if(role !== 'user'){
    inner += miniAvatarSVG();
  }
  inner += `<div class="bubble"></div>`;
  row.innerHTML = inner;
  row.querySelector('.bubble').textContent = text;
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
  return row;
}

function addTyping(){
  const row = document.createElement('div');
  row.className = 'msg-row tina';
  row.id = 'typingRow';
  row.innerHTML = miniAvatarSVG() + `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function removeTyping(){
  const t = document.getElementById('typingRow');
  if(t) t.remove();
}

function sleep(ms){ return new Promise(res => setTimeout(res, ms)); }

async function callTina(){
  const doCall = async () => {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });

    let data;
    try{
      data = await response.json();
    }catch(parseErr){
      throw new Error("La respuesta del servidor no pudo leerse (status " + response.status + ").");
    }

    if(!response.ok){
      const apiMsg = data && data.error && data.error.message ? data.error.message : ("Error " + response.status);
      throw new Error(apiMsg);
    }
    return data;
  };

  try{
    return await doCall();
  }catch(err){
    if(err.message && err.message.toLowerCase().includes('fetch')){
      await sleep(900);
      return await doCall();
    }
    throw err;
  }
}

async function sendMessage(text){
  if(!text || !text.trim()) return;
  addBubble('user', text);
  history.push({role:'user', content: text});
  input.value = '';
  sendBtn.disabled = true;
  addTyping();

  try{
    const data = await callTina();
    removeTyping();
    const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text);
    const reply = textBlocks.join('\n').trim() || "Perdón, no pude generar una respuesta. ¿Podés intentar de nuevo?";
    addBubble('tina', reply);
    history.push({role:'assistant', content: reply});
  }catch(err){
    removeTyping();
    addBubble('tina', "Uy, tuve un problema técnico (" + err.message + "). ¿Podés intentar de nuevo?");
    console.error(err);
    history.pop();
  }finally{
    sendBtn.disabled = false;
    input.focus();
  }
}

form.addEventListener('submit', (e)=>{
  e.preventDefault();
  sendMessage(input.value);
});

addBubble('tina', "¡Hola! Soy TINA, tu tutora de inglés. Estoy acá para ayudarte con los temas del libro English File Beginner. ¿Sobre qué tema querés practicar hoy? También podés tocar una de las pestañas de arriba.");
</script>
</body>
</html>
